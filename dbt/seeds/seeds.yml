version: 2

seeds:
  #INFO: ONET SEEDS
  - name: abilities
    config:
      alias: raw_onet_abilities
      schema: landing
      column_types: 
        "O*NET-SOC Code": varchar(14)
        "Element ID": varchar(12)
        "Element Name": varchar(30)
        "Scale ID": varchar(4)
        "Data Value": float
        N: varchar(3)
        "Standard Error": varchar(12)
        "Lower CI Bound": varchar(12)
        "Upper CI Bound": varchar(12)
        "Recommend Suppress": varchar(1)
        "Not Relevant": varchar(5)
        "Date": varchar(10)
        "Domain Source": varchar(30)

  - name: alternate_titles
    config:
      alias: raw_onet_alternate_titles
      schema: landing
      column_types:
        "O*NET-SOC Code": varchar(14)
        "Alternate Title": varchar(64)
        "Short Title": varchar(10)
        "Source(s)": varchar(4)

  - name: education_training_experience
    config:
      alias: raw_onet_education_training_experience
      schema: landing

  - name: emerging_tasks
