# Append this to ~/.dbt/profiles.yml
#WARN: env vars need to be set
dbt_databricks:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ./lakehouse_dev.duckdb
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG') }}"
      schema: "{{ target.name }}"

