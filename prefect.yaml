---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: Capstone-Data-Engineering
prefect-version: 3.6.24

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project
# is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
- prefect.deployments.steps.git_clone:
    repository: git@github.com:sudoneoox/Capstone-Data-Engineering.git
    branch: master
    access_token: null

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
  - name: daily-full-pipeline
    entrypoint: orchestration/flows/daily_pipeline.py:daily_pipeline
    parameters:
      mode: full
    schedule:
      cron: "0 6 * * *"    # 6 AM UTC daily
      timezone: "UTC"
    tags:
      - production
      - scheduled
 
  - name: api-refresh-only
    entrypoint: orchestration/flows/daily_pipeline.py:daily_pipeline
    parameters:
      mode: apis
    schedule: null          # on-demand only
    tags:
      - manual
 
  - name: seed-refresh
    entrypoint: orchestration/flows/daily_pipeline.py:daily_pipeline
    parameters:
      mode: seeds
    schedule:
      cron: "0 3 1 */3 *"  # 3 AM UTC, 1st of every 3rd month (quarterly)
      timezone: "UTC"
    tags:
      - quarterly
 
