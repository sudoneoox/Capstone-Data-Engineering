  <text x="68" y="123" text-anchor="middle" font-size="11" fill="#0C447C" dominant-baseline="central">BLS API</text>
  <rect x="20" y="140" width="96" height="30" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
