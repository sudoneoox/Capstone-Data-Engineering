  <text x="481" y="239" text-anchor="middle" font-size="10" fill="#085041" dominant-baseline="central">Market snapshot + trends</text>
  <rect x="560" y="222" width="142" height="26" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="631" y="239" text-anchor="middle" font-size="10" fill="#085041" dominant-baseline="central">Economic dashboard</text>
  <rect x="410" y="254" width="142" height="26" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="481" y="271" text-anchor="middle" font-size="10" fill="#085041" dominant-baseline="central">Role analysis + top skills</text>
  <rect x="560" y="254" width="142" height="26" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="631" y="271" text-anchor="middle" font-size="10" fill="#085041" dominant-baseline="central">Skills demand + gap</text>
  <rect x="410" y="286" width="142" height="26" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="481" y="303" text-anchor="middle" font-size="10" fill="#085041" dominant-baseline="central">Metro comparison</text>

  <!-- VISUALIZATION -->
  <text x="196" y="310" text-anchor="middle" font-size="12" fill="#5F5E5A">Visualization</text>
