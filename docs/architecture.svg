  <text x="545" y="398" text-anchor="middle" font-size="11" fill="#5F5E5A">Infrastructure and orchestration</text>

  <rect x="370" y="410" width="110" height="28" rx="4" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="425" y="428" text-anchor="middle" font-size="11" font-weight="500" fill="#72243E" dominant-baseline="central">Prefect</text>

  <rect x="500" y="410" width="110" height="28" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="555" y="428" text-anchor="middle" font-size="11" font-weight="500" fill="#633806" dominant-baseline="central">Terraform</text>

  <rect x="630" y="410" width="90" height="28" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="675" y="428" text-anchor="middle" font-size="11" font-weight="500" fill="#444441" dominant-baseline="central">1Password</text>

  <!-- Legend -->
  <text x="450" y="480" text-anchor="middle" font-size="11" fill="#888780">APIs → Python clients → Parquet → GCS → DuckDB → dbt (bronze → silver → gold) → Streamlit</text>
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#B4B2A9">1.48M+ job postings · 886 occupations · 25 economic indicators · 15 metro areas</text>

