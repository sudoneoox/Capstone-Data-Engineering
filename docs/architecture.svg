<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fff;">

  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="500" fill="#2C2C2A">Job market intelligence platform — architecture</text>

